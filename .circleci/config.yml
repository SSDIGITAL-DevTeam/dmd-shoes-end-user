# ==============================================
# ✅ CircleCI Configuration - SESUAI package.json project ini
# ==============================================

version: 2.1

commands:
  install-deps:
    steps:
      - checkout
      - restore_cache:
          keys:
            - pnpm-deps-v9-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-v9-
      - run:
          name: Setup PNPM
          command: corepack enable pnpm && pnpm -v
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile --prefer-offline
      - save_cache:
          paths:
            - ~/.local/share/pnpm/store
            - node_modules
          key: pnpm-deps-v9-{{ checksum "pnpm-lock.yaml" }}

jobs:
  # ✅ 1. Type Check Typescript
  typecheck:
    docker:
      - image: node:22-slim
    resource_class: small
    steps:
      - install-deps
      - run:
          name: TypeScript Type Check
          command: npx tsc --noEmit

  # ✅ 2. Run Unit Test
  test:
    docker:
      - image: node:22-slim
    resource_class: small
    steps:
      - install-deps
      - run:
          name: Run Unit Tests
          command: pnpm run test

  # ✅ 3. Test Production Build
  build-test:
    docker:
      - image: node:22-slim
    resource_class: medium
    environment:
      SKIP_ENV_VALIDATION: "true"
      NODE_ENV: "production"
    steps:
      - install-deps
      - run:
          name: Build Next.js Application
          command: pnpm run build

workflows:
  version: 2
  test-pipeline:
    jobs:
      - typecheck
      - test
      - build-test:
          requires:
            - typecheck
            - test
